<meta charset="UTF-8">

<title>Lead Sheets — Sangsamling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary:#FFFFFF;--bg-secondary:#F7F8F9;--bg-tertiary:#F0F0F0;
  --text-primary:#222222;--text-secondary:#575760;--text-muted:#6F6F6F;
  --primary:#8549BA;--primary-hover:#6A1B9A;--primary-light:#F3E5F5;
  --success:#1B873F;--border:#E0E0E0;
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
}
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.6;color:var(--text-primary);background:var(--bg-primary);margin:0;-webkit-font-smoothing:antialiased}

.top-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.top-bar h1{font-size:1.2rem;font-weight:700;margin:0;color:var(--primary);white-space:nowrap}
.search-box{flex:1;min-width:200px;max-width:400px}
.search-box input{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:20px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.filters{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--primary)}
.filter-btn.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

.container{max-width:900px;margin:0 auto;padding:1.5rem}
.song-count{color:var(--text-muted);font-size:.85rem;margin-bottom:1rem}

.song-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden;transition:box-shadow .2s}
.song-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.song-header{padding:1rem 1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.song-header:hover{background:var(--bg-secondary)}
.song-info h3{margin:0;font-size:1.05rem;font-weight:600}
.song-info .artist{color:var(--text-secondary);font-size:.85rem}
.song-tags{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.tag{padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600}
.tag-dansk{background:#E8F5E9;color:#2E7D32}
.tag-int{background:#E3F2FD;color:#1565C0}
.tag-hoejskole{background:#FFF3E0;color:#E65100}
.tag-beginner{background:#F3E5F5;color:#7B1FA2}
.tag-analyse{background:#FCE4EC;color:#C62828}
.tag-udkast{background:#FFF9C4;color:#F57F17}
.tag-verified{background:#E8F5E9;color:#2E7D32}
.expand-icon{font-size:1.2rem;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.song-card.open .expand-icon{transform:rotate(180deg)}
.song-body{display:none;padding:0 1.5rem 1.5rem;border-top:1px solid var(--border)}
.song-card.open .song-body{display:block}
.sheet-container{margin:1rem 0}
.play-btn{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:.5rem}
.play-btn:hover{background:var(--primary-hover)}
.chord-info{margin-top:.75rem;color:var(--text-secondary);font-size:.85rem}

.confidence-note{background:var(--bg-secondary);padding:1rem 1.5rem;border-radius:var(--radius-md);margin-bottom:1.5rem;font-size:.85rem;color:var(--text-secondary)}

@media(max-width:768px){
  .top-bar{padding:.5rem 1rem}
  .container{padding:1rem}
  .song-header{padding:.75rem 1rem}
  .song-body{padding:0 1rem 1rem}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>&#9835; Lead Sheets</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="S&oslash;g efter sang eller artist..." oninput="filterSongs()">
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('dansk',this)">Dansk</button>
    <button class="filter-btn" onclick="setFilter('international',this)">International</button>
    <button class="filter-btn" onclick="setFilter('hoejskole',this)">H&oslash;jskole</button>
    <button class="filter-btn" onclick="setFilter('beginner',this)">Begynder</button>
    <button class="filter-btn" onclick="setFilter('analyse',this)">Analyse</button>
    <button class="filter-btn" onclick="setFilter('verified',this)">Verificerede</button>
    <button class="filter-btn" onclick="setFilter('udkast',this)">Udkast</button>
  </div>
</div>

<div class="container">
  <div class="confidence-note">
    <strong>Bem&aelig;rk:</strong> Sange markeret med <span class="tag tag-verified">Verificeret</span> har melodier, som er gennemg&aring;et for korrekthed. Sange markeret med <span class="tag tag-udkast">Udkast</span> kan indeholde fejl i melodien og b&oslash;r tjekkes manuelt.
  </div>

  <div class="song-count" id="songCount"></div>
  <div id="songList"></div>
</div>

// ===== STATE =====
let currentFilter = 'all';
let synthControllers = {};

// ===== RENDER =====
function renderSongs() {
  const list = document.getElementById('songList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  list.innerHTML = '';
  let count = 0;

  SONGS.forEach((song, idx) => {
    // Filter
    if (currentFilter !== 'all' && !song.tags.includes(currentFilter)) return;
    // Search
    if (search && !song.title.toLowerCase().includes(search) && !song.artist.toLowerCase().includes(search)) return;

    count++;
    const card = document.createElement('div');
    card.className = 'song-card';
    card.id = 'song_' + idx;

    const tagsHTML = song.tags.map(t => {
      const cls = t === 'dansk' ? 'tag-dansk' : t === 'international' ? 'tag-int' : t === 'hoejskole' ? 'tag-hoejskole' :
                  t === 'beginner' ? 'tag-beginner' : t === 'analyse' ? 'tag-analyse' :
                  t === 'verified' ? 'tag-verified' : t === 'udkast' ? 'tag-udkast' : '';
      const label = t === 'dansk' ? 'Dansk' : t === 'international' ? 'International' : t === 'hoejskole' ? 'H\u00f8jskole' :
                    t === 'beginner' ? 'Begynder' : t === 'analyse' ? 'Analyse' :
                    t === 'verified' ? 'Verificeret' : t === 'udkast' ? 'Udkast' : t;
      return `<span class="tag ${cls}">${label}</span>`;
    }).join('');

    card.innerHTML = `
      <div class="song-header" onclick="toggleSong(${idx})">
        <div class="song-info">
          <h3>${song.title}</h3>
          <span class="artist">${song.artist}</span>
        </div>
        <div class="song-tags">${tagsHTML} <span class="expand-icon">&#9660;</span></div>
      </div>
      <div class="song-body">
        <div class="chord-info"><strong>Akkorder:</strong> ${song.chords}</div>
        <div class="sheet-container" id="sheet_${idx}"></div>
        <button class="play-btn" onclick="playSong(${idx})">&#9654; Afspil</button>
      </div>
    `;
    list.appendChild(card);
  });

  document.getElementById('songCount').textContent = count + ' sange fundet';
}

function toggleSong(idx) {
  const card = document.getElementById('song_' + idx);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    // Render ABC
    setTimeout(() => {
      const sheet = document.getElementById('sheet_' + idx);
      if (sheet && sheet.children.length === 0) {
        ABCJS.renderAbc('sheet_' + idx, SONGS[idx].abc, { responsive: 'resize' });
      }
    }, 50);
  }
}

function playSong(idx) {
  const sheet = document.getElementById('sheet_' + idx);
  if (!sheet) return;
  // Re-render to get visual object
  const visualObj = ABCJS.renderAbc('sheet_' + idx, SONGS[idx].abc, { responsive: 'resize' });
  if (visualObj && visualObj[0]) {
    if (ABCJS.synth && ABCJS.synth.SynthController) {
      const ctrl = new ABCJS.synth.SynthController();
      const existing = sheet.parentElement.querySelector('.abcjs-midi-container');
      if (!existing) {
        const audioDiv = document.createElement('div');
        audioDiv.className = 'abcjs-midi-container';
        sheet.parentElement.insertBefore(audioDiv, sheet.nextSibling);
        ctrl.load(audioDiv, null, {displayPlay: true, displayProgress: true});
      }
      ctrl.setTune(visualObj[0], false);
    }
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSongs();
}

function filterSongs() {
  renderSongs();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', renderSongs);
</script>
